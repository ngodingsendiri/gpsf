name: Android CI & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify Gradle wrapper JAR
        run: |
          set -euo pipefail
          test -f gradle/wrapper/gradle-wrapper.jar
          test -s gradle/wrapper/gradle-wrapper.jar
          jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null
          echo "gradle-wrapper.jar is a valid archive ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes)"

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpsf-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Determine Tag Name
        id: tag_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && ( "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ) ]]; then
            echo "TAG_NAME=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_NAME=" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK for Release
        if: steps.tag_info.outputs.IS_RELEASE == 'true'
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/*.apk "release-artifacts/gpsf-${{ steps.tag_info.outputs.TAG_NAME }}.apk"

      - name: Create GitHub Release and Upload APK
        if: steps.tag_info.outputs.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_info.outputs.TAG_NAME }}
          files: release-artifacts/gpsf-${{ steps.tag_info.outputs.TAG_NAME }}.apk
          draft: false
          prerelease: false
          name: Release ${{ steps.tag_info.outputs.TAG_NAME }}
          body: |
            Automated Release of gpsf ${{ steps.tag_info.outputs.TAG_NAME }}!

            ### Fitur & Perubahan
            - Membangun otomatis dari commit: `${{ github.sha }}`
            - Mock location GPS via peta OpenStreetMap
            - Material 3 + Jetpack Compose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
